<!doctype html>
<html lang="pl">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pogoda dla operatorów dronów</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <header>
    <img class="bgc" src="img/img2.png" alt="dron w locie o zachodzie słońca">
    <div class="title">
      <h1>Drone Weather</h1>
    </div>
    <nav class="header">
      <div class="logo">
        <img src="img/img1.png" alt="Weather Icon" />
        <h1>apka dla droniarzy</h1>
      </div>
      <div class="time">
        <ul>
          <li class="active">1 link</li>
          <li>2 link</li>
          <li>3 link</li>
        </ul>
      </div>
    </nav>
  </header>
  <div class="temp-switch">
    <label>
      <input type="checkbox" id="temp-toggle" />
      <div class="slider"></div>
      <span class="toggle-cels">°C</span>
      <span class="toggle-fahr">°F</span>
    </label>
  </div>
  <main>
  <div class="wrapper">
    <div class="top">
      <div class="top-city">
        <h1 class="city-name"></h1>
      </div>
      <div class="main-info">
        <div>
          <input class="input-weather" type="text" placeholder="Wpisz nazwę miasta..." aria-label="Nazwa miasta" />
          <p class="warning" aria-live="polite"></p>
        </div>
      </div>
      <div class="top-time">
        <h2 class="local-time"></h2>
      </div>
    </div>
    <div class="middle">
      <div class="center-temperature">
        <p class="temperature"></p>
        <img src="./img/unknown.png" alt="Obrazek przedstawiający pogodę" class="photo" />
      </div>
    </div>
    <div class="bottom">
      <div class="headings">
        <p>Weather:</p>
        <p>Cloud cover:</p>
        <p>Visibility:</p>
      </div>
      <div class="weather-info">
        <p class="weather"></p>
        <p class="cloud"></p>
        <p class="visibility"></p>
      </div>
      <div class="headings">
        <p>Wind spreed:</p>
        <p>Wind direction:</p>
        <p>Wind degree:</p>
      </div>
      <div class="weather-info">
        <p class="wind"></p>
        <p class="wind-direction"></p>
        <p class="wind-degree"></p>
      </div>
      <div class="headings">
        <p>Gust:</p>
        <p>Humidity:</p>
        <p>UV index:</p>
      </div>
      <div class="weather-info">
        <p class="gust"></p>
        <p class="humidity"></p>
        <p class="uv"></p>
      </div>
    </div>
  </div>
  <div class="table">
    <div class="table-title">
      <h4 class="title-one">Check weather condition</h4>
    </div>
    <div class="heading-table">
      <h2 class="heading-title">Cloud cover:
      <span class="weath-one"> </span></h2> 
    </div>
    <div class="heading-table">
      <h2 class="heading-title">Visibility:
      <span class="weath-two"> </span> </h2>
    </div>
    <div class="heading-table">
      <h2 class="heading-title">Wind speed:
      <span class="weath-three"> </span> </h2>
    </div>
    <div class="heading-table">
      <h2 class="heading-title">Gust:
      <span class="weath-four"> </span> </h2>
    </div>
    <div class="heading-table">
      <h2 class="heading-title">Humidity:
      <span class="weath-five"> </span> </h2>
    </div>
    <div class="heading-table">
      <h2 class="heading-title">UV index:
      <span class="weath-six"> </span> </h2>
    </div>
  </div>
  </main>
  <section class="main-cnt">
    <div class="elem one">
      <div class="top-weath">
        <h1 class="city-hour0"></h1>
      </div>
      <div class="middle-weath">
        <div class="city-image0">
          <img src="./img/unknown.png" alt="Obrazek przedstawiający pogodę" class="photo0" />
        </div>
      </div>
      <div class="bottom-weath">
        <h1 class="city-temp0"></h1>
      </div>
    </div>
    <div class="elem two">
      <div class="top-weath">
        <h1 class="city-hour1"></h1>
      </div>
      <div class="middle-weath">
        <div class="city-image1">
          <img src="./img/unknown.png" alt="Obrazek przedstawiający pogodę" class="photo1" />
        </div>
      </div>
      <div class="bottom-weath">
        <h1 class="city-temp1"></h1>
      </div>
    </div>
    <div class="elem three">
      <div class="top-weath">
        <h1 class="city-hour2"></h1>
      </div>
      <div class="middle-weath">
        <div class="city-image2">
          <img src="./img/unknown.png" alt="Obrazek przedstawiający pogodę" class="photo2" />
        </div>
      </div>
      <div class="bottom-weath">
        <h1 class="city-temp2"></h1>
      </div>
    </div>
    <div class="elem four">
      <div class="top-weath">
        <h1 class="city-hour3"></h1>
      </div>
      <div class="middle-weath">
        <div class="city-image3">
          <img src="./img/unknown.png" alt="Obrazek przedstawiający pogodę" class="photo3" />
        </div>
      </div>
      <div class="bottom-weath">
        <h1 class="city-temp3"></h1>
      </div>
    </div>
    <div class="elem five">
      <div class="top-weath">
        <h1 class="city-hour4"></h1>
      </div>
      <div class="middle-weath">
        <div class="city-image4">
          <img src="./img/unknown.png" alt="Obrazek przedstawiający pogodę" class="photo4" />
        </div>
      </div>
      <div class="bottom-weath">
        <h1 class="city-temp4"></h1>
      </div>
    </div>
    <div class="elem six">
      <div class="top-weath">
        <h1 class="city-hour5"></h1>
      </div>
      <div class="middle-weath">
        <div class="city-image5">
          <img src="./img/unknown.png" alt="Obrazek przedstawiający pogodę" class="photo5" />
        </div>
      </div>
      <div class="bottom-weath">
        <h1 class="city-temp5"></h1>
      </div>
    </div>
  </section>

  <script src="js/script.js"></script>
</body>

</html>
