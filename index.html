<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pogoda dla operatorów dronów</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header class="header">
      <div class="logo">
        <img src="img/unknown.png" alt="Weather Icon" />
        <h1>apka dla droniarzy</h1>
      </div>
      <nav class="time">
        <ul>
          <li class="active">1 link</li>
          <li>2 link</li>
          <li>3 link</li>
        </ul>
      </nav>
      <div class="temp-switch">
        <label>
          <input type="checkbox" id="temp-toggle" />
          <div class="slider"></div>
          <span class="toggle-cels">°C</span> /
          <span class="toggle-fahr">°F</span>
        </label>
      </div>
    </header>
  <div class="wrapper">
    <div class="top">
      <div class="top-city">
        <h1 class="city-name"></h1>
    </div>
    <div class="main-info">
        <div>
            <input class="input-weather" type="text" placeholder="Wpisz nazwę miasta..." aria-label="Nazwa miasta">
            <p class="warning" aria-live="polite"></p>
        </div>
    </div>
    <div class="top-time">
        <h2 class="local-time"></h2>
    </div>
    </div>
      <div class="middle">
        <div class="center-temperature">
            <p class="temperature"></p>
            <img src="./img/unknown.png" alt="Obrazek przedstawiający pogodę" class="photo">
        </div>
    </div>
      <main class="bottom">
        <div class="headings">
            <p>Weather:</p>
            <p>Cloud cover:</p>
            <p>Visibility:</p>
        </div>
        <div class="weather-info">
            <p class="weather"></p>
            <p class="cloud"></p>
            <p class="visibility"></p>
        </div>
        <div class="headings">
            <p>Wind spreed:</p>
            <p>Wind direction:</p>
            <p>Wind degree:</p>
        </div>
        <div class="weather-info">
            <p class="wind"></p>
            <p class="wind-direction"></p>
            <p class="wind-degree"></p>
        </div>
        <div class="headings">
            <p>Gust:</p>
            <p>Humidity:</p>
            <p>UV index:</p>
        </div>
        <div class="weather-info">
            <p class="gust"></p>
            <p class="humidity"></p>
            <p class="uv"></p>
        </div>
    </main>
    </div>

    <section class="main-cnt">
      <div class="elem one">d

      </div>
      <div class="elem two">d</div>
      <div class="elem three">d</div>
      <div class="elem four">d</div>
      <div class="elem five">d</div>
      <div class="elem six">d</div>

    </section>
    <script src="js/script.js"></script>
  </body>
</html>
